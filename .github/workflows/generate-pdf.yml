name: Generate PDF CV

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for pushing changes back
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: false
        
    - name: Install dependencies
      run: |
        echo "📦 Installing dependencies..."
        bundle install
        
    - name: Verify Jekyll setup
      run: |
        echo "🔍 Verifying Jekyll setup..."
        bundle --version
        bundle list | grep jekyll
        
        echo "📋 Jekyll configuration:"
        cat _config.yml
        
        echo "📊 Data file content preview:"
        head -20 _data/data.yml
        
    - name: Build Jekyll site
      run: |
        echo "🔨 Building Jekyll site..."
        bundle exec jekyll build --destination _site --verbose
        
        echo "✅ Jekyll build completed"
        echo "📁 Checking _site directory structure:"
        if [ -d "_site" ]; then
          find _site -type f -name "*.html" | head -20
          echo "📊 Total HTML files: $(find _site -name "*.html" | wc -l)"
          
          echo "📄 Checking main index.html content:"
          if [ -f "_site/index.html" ]; then
            echo "✅ Main page exists"
            head -20 _site/index.html
            echo "📊 Main page size: $(wc -c < _site/index.html) bytes"
          else
            echo "❌ Main page missing!"
          fi
          
          echo "📁 Full _site directory contents:"
          ls -la _site/
        else
          echo "❌ ERROR: _site directory was not created!"
          exit 1
        fi
        
    - name: Verify main page exists
      run: |
        echo "🔍 Looking for main page..."
        
        if [ -f "_site/index.html" ]; then
          echo "✅ Found main page at: _site/index.html"
          echo "MAIN_PAGE_EXISTS=true" >> $GITHUB_ENV
        else
          echo "❌ ERROR: Main page not found!"
          echo "📁 Available files in _site:"
          ls -la _site/ || echo "Cannot list _site directory"
          exit 1
        fi
        
    - name: Generate PDF using playwright
      run: |
        echo "🎭 Starting PDF generation with Playwright..."
        
        # Install dependencies
        echo "📦 Installing Node.js dependencies..."
        npm install
        
        echo "🔧 Installing Playwright browsers..."
        npx playwright install chromium --with-deps
        
        echo "✅ Dependencies installed successfully"

        # Serve the built _site directory over HTTP so Playwright can load all assets
        # Use Python's built-in HTTP server — always available on Ubuntu runners
        echo "🌐 Starting static file server..."
        python3 -m http.server 4000 --directory _site &
        SERVER_PID=$!

        # Wait for server to be ready
        echo "⏳ Waiting for server..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:4000 > /dev/null; then
            echo "✅ Server ready"
            break
          fi
          sleep 1
        done
        
        # Run PDF generation script
        echo "📝 Running PDF generation script..."
        npm run generate-pdf

        # Stop server
        kill $SERVER_PID 2>/dev/null || true
        echo "✅ Server stopped"
        
    - name: Verify PDF was created
      run: |
        echo "🔍 Verifying PDF creation..."
        
        if [ -f "assets/pdf/cv-keg-dev-print.pdf" ]; then
          PDF_SIZE=$(stat -c%s "assets/pdf/cv-keg-dev-print.pdf")
          echo "✅ PDF created successfully!"
          echo "📊 PDF file size: $PDF_SIZE bytes ($(($PDF_SIZE / 1024)) KB)"
          
          if [ $PDF_SIZE -lt 1000 ]; then
            echo "⚠️  WARNING: PDF file seems very small, might be corrupted"
            exit 1
          fi
          
          echo "✅ PDF generation completed successfully!"
        else
          echo "❌ ERROR: PDF file was not created!"
          echo "📁 Contents of assets/pdf directory:"
          ls -la assets/pdf/ || echo "assets/pdf directory does not exist"
          exit 1
        fi
        
    - name: Commit and push updated PDF
      run: |
        echo "📤 Committing and pushing PDF..."
        
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add the PDF file
        git add assets/pdf/cv-keg-dev-print.pdf
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️  No changes detected in PDF file"
        else
          echo "📝 Changes detected in PDF file"
          # Use [skip ci] and [skip actions] to prevent triggering more workflows
          git commit -m "🤖 Auto-update CV PDF [skip ci][skip actions]" \
                     -m "Updated PDF generated from latest CV content" \
                     -m "Automated by GitHub Actions PDF generation workflow"
          git push
          echo "✅ PDF updated and pushed to repository"
        fi